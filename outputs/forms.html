<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Forms | Narges Darweshi</title>
  </head>
  <body>
    <form name="short-note-review" method="POST" action="/thank-you.html" data-netlify="true" netlify netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="short-note-review" />
      <input name="bot-field" />
      <textarea name="Note"></textarea>
      <input name="Name" />
    </form>

    <form name="contact-message" method="POST" action="/thank-you.html" data-netlify="true" netlify netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="contact-message" />
      <input name="bot-field" />
      <input name="Name" />
      <input name="Email" />
      <textarea name="Message"></textarea>
    </form>

    <form name="newsletter-subscription" method="POST" action="/thank-you.html" data-netlify="true" netlify netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="newsletter-subscription" />
      <input name="bot-field" />
      <input name="Email" />
    </form>
  </body>
</html>
